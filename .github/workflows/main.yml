name: Navlonix CI

on: [push]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore API
        run: dotnet restore apps/api/Yukle.Api/Yukle.Api.sln
      - name: Build API
        run: dotnet build apps/api/Yukle.Api/Yukle.Api.sln -c Release --no-restore

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build web
        run: cd apps/web && npm install && npm run build
